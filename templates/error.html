<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - BookRecommender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; color: white; padding: 40px; }
        .error-icon { font-size: 80px; margin-bottom: 20px; }
        .error-message { font-size: 24px; margin-bottom: 30px; }
        .btn { display: inline-block; background: white; color: #667eea; text-decoration: none; padding: 15px 40px; border-radius: 50px; font-weight: 600; font-size: 18px; }
        .btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-message">{{ error }}</div>
        <a href="/" class="btn">← Return to Home</a>
    </div>
</body>
</html>
